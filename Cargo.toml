[package]
name = "merustmar"
version = "0.1.0"
edition = "2024"

[dependencies]
crossterm = "0.28"
rand = "0.8"

[profile.release]
opt-level = "z"   # Optimize for size
lto = true        # Enable Link Time Optimization
codegen-units = 1 # Increase cross-crate optimizations
panic = "abort"
strip = true
